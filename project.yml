name: Commit
options:
  bundleIdPrefix: com.arronlingham
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

# Local-only macOS app (free Apple ID friendly): no Firebase / no external services.
# Cross-device sync was removed; the app is a single-device local SwiftData app.

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    # Set your Apple Developer Team ID here (or in Xcode's Signing & Capabilities).
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  # ---------------------------------------------------------------------------
  # Shared framework: models, scheduling, persistence, theme, graph view.
  # Linked by both the app and the widget so there is one source of truth.
  # ---------------------------------------------------------------------------
  CommitCore:
    type: framework
    supportedDestinations: [macOS]
    sources:
      - CommitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arronlingham.commit.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: NO

  # ---------------------------------------------------------------------------
  # Main app — SwiftUI, macOS only (local-only).
  # ---------------------------------------------------------------------------
  Commit:
    type: application
    supportedDestinations: [macOS]
    sources:
      - CommitApp
    dependencies:
      - target: CommitCore
        embed: true
      - target: CommitWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arronlingham.commit
        PRODUCT_NAME: Commit
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: CommitApp/Commit-macOS.entitlements
        # macOS: automatic signing with a free Personal Team. Required because the App
        # Groups entitlement (for widget data sharing) needs a provisioning profile, which
        # ad-hoc "Sign to Run Locally" can't provide. Set DEVELOPMENT_TEAM in the base
        # settings (or pick the team in Xcode → Signing & Capabilities) so this resolves.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Commit
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: NO
        ENABLE_HARDENED_RUNTIME: YES

  # ---------------------------------------------------------------------------
  # WidgetKit extension — contribution graph + interactive "today" widget.
  # ---------------------------------------------------------------------------
  CommitWidget:
    type: app-extension
    supportedDestinations: [macOS]
    sources:
      - CommitWidget
    dependencies:
      - target: CommitCore
        embed: false
        link: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arronlingham.commit.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CommitWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CommitWidget/CommitWidget-macOS.entitlements
        # macOS: automatic signing with the Personal Team (matches the app target).
        INFOPLIST_KEY_CFBundleDisplayName: Commit
        ENABLE_HARDENED_RUNTIME: YES

  # ---------------------------------------------------------------------------
  # Pure-logic unit tests for scheduling + intensity mapping.
  # ---------------------------------------------------------------------------
  CommitCoreTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - CommitCoreTests
    dependencies:
      - target: CommitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arronlingham.commit.coretests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Commit:
    build:
      targets:
        Commit: all
        CommitWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CommitCoreTests
